<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brynsiencyn Weather</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1419;
    --surface:   #1a2230;
    --border:    #2a3a50;
    --muted:     #4a6080;
    --text:      #c8d8e8;
    --bright:    #e8f4ff;
    --rain-low:  #2a6496;
    --rain-mid:  #1a8fcf;
    --rain-high: #00c3ff;
    --wind-low:  #2a7a4a;
    --wind-mid:  #f0a500;
    --wind-high: #e84040;
    --now:       #f0a500;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
  }

  header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 8px;
  }

  .location {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    color: var(--bright);
    text-transform: uppercase;
  }

  .coords {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .updated {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .day-nav {
    display: flex;
    gap: 0;
    padding: 12px 20px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .day-tab {
    padding: 8px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--now); border-bottom-color: var(--now); }

  .legend {
    display: flex;
    gap: 20px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .forecast-grid {
    padding: 8px 20px 24px;
  }

  .hour-row {
    display: grid;
    grid-template-columns: 52px 1fr 52px 1fr 52px;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .hour-row:last-child { border-bottom: none; }

  .hour-row.is-now {
    background: rgba(240,165,0,0.06);
    border-radius: 4px;
  }

  .hour-row.is-now .hour-label {
    color: var(--now);
  }

  .hour-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: right;
    padding-right: 4px;
  }

  .bar-track {
    height: 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    min-width: 0;
    transition: width 0.3s ease;
  }

  .val-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    text-align: center;
    min-width: 40px;
  }

  .rain-val { color: var(--rain-high); }
  .wind-val { color: var(--text); }

  .section-header {
    display: grid;
    grid-template-columns: 52px 1fr 52px 1fr 52px;
    gap: 6px;
    padding: 14px 0 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .col-head { text-align: center; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
  }

  .error {
    text-align: center;
    padding: 40px 20px;
    color: #e84040;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
  }

  .summary-bar {
    display: flex;
    gap: 20px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .summary-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    color: var(--bright);
  }

  @media (max-width: 480px) {
    .hour-row { grid-template-columns: 44px 1fr 44px 1fr 44px; gap: 4px; }
    .section-header { grid-template-columns: 44px 1fr 44px 1fr 44px; gap: 4px; }
    .forecast-grid { padding: 8px 12px 24px; }
    .legend { padding: 8px 12px; }
    .day-nav { padding: 10px 12px 0; }
    header { padding: 14px 12px 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="location">Brynsiencyn · Ynys Môn</div>
    <div class="coords">53.1667°N &nbsp; 4.3167°W</div>
  </div>
  <div class="updated" id="updated-time">—</div>
</header>

<div class="summary-bar" id="summary-bar">
  <div class="loading">Loading forecast…</div>
</div>

<nav class="day-nav" id="day-nav"></nav>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:var(--rain-low)"></span> Light rain</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--rain-mid)"></span> Moderate rain</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--rain-high)"></span> Heavy rain</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--wind-low)"></span> Calm wind</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--wind-mid)"></span> Fresh wind</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--wind-high)"></span> Strong wind</div>
</div>

<div class="forecast-grid" id="forecast-grid">
</div>

<script>
const LAT = 53.1667;
const LON = -4.3167;
const KMH_TO_MPH = 0.621371;

let allData = null;
let selectedDay = 0;

function rainColor(mm) {
  if (mm <= 0) return 'transparent';
  if (mm < 1) return 'var(--rain-low)';
  if (mm < 4) return 'var(--rain-mid)';
  return 'var(--rain-high)';
}

function windColor(mph) {
  if (mph < 15) return 'var(--wind-low)';
  if (mph < 30) return 'var(--wind-mid)';
  return 'var(--wind-high)';
}

function rainBarWidth(mm) {
  // Scale: 0mm = 0%, 10mm+ = 100%
  return Math.min(100, (mm / 10) * 100);
}

function windBarWidth(mph) {
  // Scale: 0mph = 0%, 60mph+ = 100%
  return Math.min(100, (mph / 60) * 100);
}

function groupByDay(times, rain, wind) {
  const days = {};
  times.forEach((t, i) => {
    const d = new Date(t);
    const key = d.toISOString().slice(0, 10);
    if (!days[key]) days[key] = { date: d, hours: [] };
    days[key].hours.push({
      time: d,
      rain: rain[i],
      wind: wind[i] * KMH_TO_MPH
    });
  });
  return Object.values(days);
}

function formatDayTab(date, index) {
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (isToday) return `Today ${date.getDate()} ${months[date.getMonth()]}`;
  return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
}

function renderSummary(dayData) {
  const maxRain = Math.max(...dayData.hours.map(h => h.rain));
  const maxWind = Math.max(...dayData.hours.map(h => h.wind));
  const totalRain = dayData.hours.reduce((s, h) => s + h.rain, 0);
  const now = new Date();

  const bar = document.getElementById('summary-bar');
  bar.innerHTML = `
    <div class="summary-item">
      <span class="summary-label">Total rain</span>
      <span class="summary-value">${totalRain.toFixed(1)} mm</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Peak rain</span>
      <span class="summary-value">${maxRain.toFixed(1)} mm/hr</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Peak wind</span>
      <span class="summary-value">${Math.round(maxWind)} mph</span>
    </div>
  `;
}

function renderGrid(dayData) {
  const grid = document.getElementById('forecast-grid');
  const now = new Date();

  let html = `
    <div class="section-header">
      <div></div>
      <div class="col-head">Rain (mm/hr)</div>
      <div class="col-head"></div>
      <div class="col-head">Wind (mph)</div>
      <div class="col-head"></div>
    </div>
  `;

  dayData.hours.forEach(h => {
    const hourStr = h.time.getHours().toString().padStart(2, '0') + ':00';
    const isNow = h.time.getHours() === now.getHours() &&
                  h.time.toDateString() === now.toDateString();

    const rColor = rainColor(h.rain);
    const wColor = windColor(h.wind);
    const rWidth = rainBarWidth(h.rain);
    const wWidth = windBarWidth(h.wind);
    const rainDisplay = h.rain > 0 ? h.rain.toFixed(1) : '—';
    const windDisplay = Math.round(h.wind);

    html += `
      <div class="hour-row${isNow ? ' is-now' : ''}">
        <div class="hour-label">${hourStr}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${rWidth}%;background:${rColor}"></div>
        </div>
        <div class="val-label rain-val">${rainDisplay}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${wWidth}%;background:${wColor}"></div>
        </div>
        <div class="val-label wind-val">${windDisplay}</div>
      </div>
    `;
  });

  grid.innerHTML = html;
  renderSummary(dayData);
}

function renderDayNav(days) {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = days.map((d, i) => `
    <button class="day-tab${i === selectedDay ? ' active' : ''}" data-index="${i}">
      ${formatDayTab(d.date, i)}
    </button>
  `).join('');

  nav.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedDay = parseInt(btn.dataset.index);
      nav.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(days[selectedDay]);
    });
  });
}

async function fetchForecast() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=precipitation,windspeed_10m&timezone=Europe%2FLondon&forecast_days=7`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const days = groupByDay(
      data.hourly.time,
      data.hourly.precipitation,
      data.hourly.windspeed_10m
    );

    allData = days;

    // Default to today
    const now = new Date();
    const todayIndex = days.findIndex(d => d.date.toDateString() === now.toDateString());
    selectedDay = todayIndex >= 0 ? todayIndex : 0;

    document.getElementById('updated-time').textContent =
      'Updated ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    renderDayNav(days);
    renderGrid(days[selectedDay]);

  } catch (err) {
    document.getElementById('forecast-grid').innerHTML =
      `<div class="error">Failed to load forecast.<br>${err.message}</div>`;
    document.getElementById('summary-bar').innerHTML = '';
  }
}

fetchForecast();
</script>
</body>
</html>
